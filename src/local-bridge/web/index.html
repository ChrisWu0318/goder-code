<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Goder Code</title>
<style>
:root{--bg:#1a1a2e;--surface:#16213e;--border:#0f3460;--accent:#e94560;--text:#eee;--dim:#999;--user-bg:#0f3460;--mono:'SF Mono',Menlo,monospace;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent}
.hdr{padding:calc(var(--safe-t) + 8px) 16px 8px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr h1{font-size:17px;font-weight:600}
.hdr .st{font-size:12px;padding:3px 8px;border-radius:10px;background:var(--border);color:#fff}
.hdr .st.ok{background:#3fb950;color:#000}
.hdr .st.err{background:#f85149}
.chat{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.m{max-width:90%;padding:10px 14px;border-radius:16px;font-size:15px;line-height:1.45;word-break:break-word}
.m.u{align-self:flex-end;background:var(--user-bg);border-bottom-right-radius:4px}
.m.a{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.m.a pre{background:#0d1117;padding:8px;border-radius:8px;overflow-x:auto;font-size:13px;margin:6px 0}
.m.a code,.m.tu{font-family:var(--mono)}
.m.err{align-self:center;background:rgba(248,81,73,.15);border:1px solid var(--accent);color:var(--accent);font-size:13px;max-width:100%}
.m.info{align-self:center;background:0 0;color:var(--dim);font-size:12px;max-width:100%}
.m.tu{align-self:flex-start;background:#0d1117;border:1px solid var(--border);border-bottom-left-radius:4px;font-size:13px;max-width:90%}
.m.tu .tn{color:var(--accent);font-weight:600;margin-bottom:4px}
.think{align-self:flex-start;padding:10px 14px;color:var(--dim);font-size:14px}
.dot{animation:blink 1.4s infinite}.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.input{padding:8px 12px calc(var(--safe-b) + 8px);background:var(--surface);border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.input textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:18px;color:var(--text);font-size:16px;padding:10px 16px;resize:none;outline:none;max-height:120px;font-family:inherit;-webkit-appearance:none}
.input textarea:focus{border-color:var(--accent)}
.btn{width:44px;height:44px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;-webkit-appearance:none}
.btn:disabled{opacity:.4}
.btn.stop{background:#d29922}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--dim);text-align:center;padding:32px}
.welcome h2{font-size:20px;margin-bottom:8px;color:var(--text)}
.welcome p{font-size:14px;line-height:1.5}
</style>
</head>
<body>
<div class="hdr"><h1>Goder Code</h1><span class="st" id="st">Connecting...</span></div>
<div class="chat" id="chat"><div class="welcome" id="wl"><h2>Send a task</h2><p>Type your prompt below.<br>Goder Code will execute it on your machine.</p></div></div>
<div class="input">
  <textarea id="inp" rows="1" placeholder="Type a task..." enterkeyhint="send"></textarea>
  <button class="btn" id="btn" disabled>↑</button>
</div>
<script>
const chat=document.getElementById('chat'),inp=document.getElementById('inp'),btn=document.getElementById('btn'),st=document.getElementById('st'),wl=document.getElementById('wl');
let ws=null,running=false;
function connect(){
  const proto=location.protocol==='https:'?'wss':'ws',tok=new URLSearchParams(location.search).get('token')||'';
  ws=new WebSocket(`${proto}://${location.host}/?token=${tok}`);
  ws.onopen=()=>{st.textContent='Connected';st.className='st ok'};
  ws.onclose=()=>{st.textContent='Disconnected';st.className='st err';running=false;updBtn();setTimeout(connect,3000)};
  ws.onerror=()=>{st.textContent='Error';st.className='st err'};
  ws.onmessage=e=>{
    try{const m=JSON.parse(e.data);onMsg(m)}catch{}
  };
}
function onMsg(m){
  switch(m.type){
    case'assistant':if(wl)wl.remove();rmThink();add('a',m.text);break;
    case'tool_use':if(wl)wl.remove();addTool(m.name,m.input);break;
    case'done':running=false;updBtn();rmThink();add('info','✓ Done');break;
    case'error':add('err',m.message);running=false;updBtn();rmThink();break;
    case'info':if(m.message&&!m.message.includes('Bun'))add('info',m.message);break;
    case'pong':break;
  }
}
function add(cls,html){
  const d=document.createElement('div');d.className='m '+cls;
  let h=esc(html);
  h=h.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\n/g,'<br>');
  d.innerHTML=h;chat.appendChild(d);scroll();
}
function addTool(name,input){
  const d=document.createElement('div');d.className='m tu';
  const s=typeof input==='string'?input:JSON.stringify(input,null,2);
  const p=s.length>200?s.slice(0,200)+'...':s;
  d.innerHTML=`<div class="tn">${esc(name)}</div>${esc(p)}`;chat.appendChild(d);scroll();
}
function showThink(){
  rmThink();
  const d=document.createElement('div');d.className='think';d.id='think';
  d.innerHTML='Thinking<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>';
  chat.appendChild(d);scroll();
}
function rmThink(){const t=document.getElementById('think');if(t)t.remove()}
function scroll(){requestAnimationFrame(()=>{chat.scrollTop=chat.scrollHeight})}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function sendTask(){
  const t=inp.value.trim();if(!t||!ws||ws.readyState!==1||running)return;
  if(wl)wl.remove();add('u',t);showThink();
  ws.send(JSON.stringify({type:'task',text:t}));inp.value='';inp.style.height='auto';running=true;updBtn();
}
function abort(){
  if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'abort'}));
  running=false;updBtn();rmThink();add('info','⏹ Aborted');
}
function updBtn(){
  if(running){btn.textContent='■';btn.classList.add('stop');btn.disabled=false}
  else{btn.textContent='↑';btn.classList.remove('stop');btn.disabled=!inp.value.trim()}
}
btn.onclick=()=>{if(running)abort();else sendTask()};
inp.oninput=()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,120)+'px';if(!running)updBtn()};
inp.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(running)abort();else sendTask()}};
connect();
</script>
</body>
</html>
